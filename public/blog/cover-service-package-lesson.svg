<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgSPL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="50%" stop-color="#EDE8DC"/>
      <stop offset="100%" stop-color="#E5DDD0"/>
    </linearGradient>
    <pattern id="dotsSPL" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2C2C2C" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#bgSPL)"/>
  <rect width="1200" height="630" fill="url(#dotsSPL)"/>

  <!-- Top accent bar + left vertical bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#B85C3C"/>
  <rect x="40" y="60" width="6" height="510" fill="#5C3A6B"/>

  <!-- Eyebrow tag -->
  <rect x="80" y="70" width="240" height="24" fill="#2C2C2C"/>
  <text x="200" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1.5" text-anchor="middle" fill="#F5F1E8">MODULE 2.7 · NEW LESSON</text>

  <!-- Title -->
  <text x="80" y="150" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#2C2C2C">Turn a finished engagement</text>
  <text x="80" y="196" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#2C2C2C">into a sellable service</text>

  <!-- Left: project folder (finished engagement) -->
  <rect x="96" y="272" width="280" height="230" fill="#E8B923" opacity="0.4"/>
  <rect x="80" y="230" width="110" height="26" fill="#B85C3C" stroke="#2C2C2C" stroke-width="3"/>
  <rect x="80" y="256" width="280" height="230" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
  <rect x="80" y="256" width="280" height="44" fill="#2C2C2C"/>
  <text x="220" y="284" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#F5F1E8">FINISHED ENGAGEMENT</text>

  <!-- Folder contents: raw delivery files -->
  <rect x="100" y="318" width="240" height="32" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <rect x="108" y="328" width="12" height="12" fill="#B85C3C"/>
  <text x="130" y="338" font-family="monospace" font-size="12" fill="#2C2C2C">151 tickets resolved</text>

  <rect x="100" y="358" width="240" height="32" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <rect x="108" y="368" width="12" height="12" fill="#5C3A6B"/>
  <text x="130" y="378" font-family="monospace" font-size="12" fill="#2C2C2C">runbooks · scripts · SLAs</text>

  <rect x="100" y="398" width="240" height="32" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <rect x="108" y="408" width="12" height="12" fill="#6B8E23"/>
  <text x="130" y="418" font-family="monospace" font-size="12" fill="#2C2C2C">12 months prod support</text>

  <rect x="100" y="442" width="240" height="1" fill="#2C2C2C" opacity="0.2"/>
  <text x="220" y="466" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#666666">shipped · valuable · invisible</text>

  <!-- Arrow: folder to package -->
  <line x1="378" y1="371" x2="440" y2="371" stroke="#2C2C2C" stroke-width="4"/>
  <polygon points="438,361 454,371 438,381" fill="#2C2C2C"/>
  <text x="414" y="352" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#B85C3C">PACKAGE</text>
  <text x="414" y="394" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666666">extract · reframe</text>

