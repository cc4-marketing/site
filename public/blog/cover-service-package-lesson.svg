  <!-- Artifact 1: service blueprint -->
  <rect x="475" y="312" width="190" height="150" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="475" y="312" width="190" height="26" fill="#B85C3C"/>
  <text x="570" y="330" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#F5F1E8">SERVICE BLUEPRINT</text>
  <rect x="487" y="350" width="120" height="5" rx="2" fill="#2C2C2C" opacity="0.4"/>
  <rect x="487" y="362" width="150" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <rect x="487" y="372" width="135" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <rect x="487" y="390" width="48" height="28" fill="#F5F1E8" stroke="#2C2C2C" stroke-width="1"/>
  <text x="511" y="409" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C2C2C">S</text>
  <rect x="541" y="390" width="48" height="28" fill="#E8B923" stroke="#2C2C2C" stroke-width="1"/>
  <text x="565" y="409" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C2C2C">M</text>
  <rect x="595" y="390" width="48" height="28" fill="#F5F1E8" stroke="#2C2C2C" stroke-width="1"/>
  <text x="619" y="409" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C2C2C">L</text>
  <text x="570" y="448" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">scope · tiers · pricing</text>

  <!-- Artifact 2: case study -->
  <rect x="685" y="312" width="190" height="150" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="685" y="312" width="190" height="26" fill="#E8B923"/>
  <text x="780" y="330" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2C2C2C">CASE STUDY</text>
  <rect x="697" y="350" width="120" height="5" rx="2" fill="#2C2C2C" opacity="0.4"/>
  <rect x="697" y="362" width="150" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <rect x="697" y="372" width="135" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <text x="780" y="416" font-family="Georgia, serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2C2C2C">64% → 87%</text>
  <text x="780" y="433" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">self-serve resolution</text>
  <text x="780" y="452" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">numbers · narrative</text>

  <!-- Artifact 3: landing page -->
  <rect x="895" y="312" width="190" height="150" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="895" y="312" width="190" height="26" fill="#6B8E23"/>
  <text x="990" y="330" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#F5F1E8">LANDING PAGE</text>
  <rect x="907" y="346" width="166" height="34" fill="#5C3A6B"/>
  <rect x="915" y="356" width="90" height="5" rx="2" fill="#F5F1E8"/>
  <rect x="915" y="366" width="60" height="4" rx="2" fill="#F5F1E8" opacity="0.7"/>
  <rect x="907" y="390" width="150" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <rect x="907" y="400" width="135" height="4" rx="2" fill="#2C2C2C" opacity="0.3"/>
  <rect x="907" y="414" width="64" height="18" fill="#B85C3C"/>
  <rect x="915" y="421" width="48" height="4" rx="2" fill="#F5F1E8"/>
  <text x="990" y="452" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">one offer · one CTA</text>

  <!-- Proof band -->
  <rect x="80" y="510" width="1040" height="42" fill="#2C2C2C"/>
  <rect x="96" y="521" width="70" height="20" fill="#E8B923"/>
  <text x="131" y="535" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2C2C2C">PROOF</text>
  <text x="650" y="538" font-family="Georgia, serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#F5F1E8"><tspan fill="#E8B923">0</tspan> SLA BREACHES · <tspan fill="#E8B923">151</tspan> TICKETS · <tspan fill="#E8B923">64%→87%</tspan></text>

  <!-- Footer strip -->
  <rect x="80" y="570" width="1040" height="36" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  <text x="100" y="593" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2C2C2C">FROM DELIVERY TO PRODUCT</text>
  <text x="1100" y="593" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#B85C3C">CC4.MARKETING</text>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#2C2C2C"/>
</svg>
