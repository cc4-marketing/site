<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgAlice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="50%" stop-color="#EDE8DC"/>
      <stop offset="100%" stop-color="#E5DDD0"/>
    </linearGradient>
    <pattern id="dotsAlice" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2C2C2C" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect width="1200" height="630" fill="url(#bgAlice)"/>
  <rect width="1200" height="630" fill="url(#dotsAlice)"/>

  <!-- Top accent bar + left vertical bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#B85C3C"/>
  <rect x="40" y="60" width="6" height="510" fill="#5C3A6B"/>

  <!-- Eyebrow label -->
  <rect x="80" y="80" width="230" height="24" fill="#2C2C2C"/>
  <text x="195" y="97" font-family="Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1.5" text-anchor="middle" fill="#F5F1E8">EXTRACTED PATTERN</text>

  <!-- Left panel: chaotic commit cloud (raw work) -->
  <rect x="96" y="136" width="360" height="420" fill="#E8B923" opacity="0.4"/>
  <rect x="80" y="120" width="360" height="420" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
  <rect x="80" y="120" width="360" height="52" fill="#2C2C2C"/>
  <text x="260" y="153" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#F5F1E8">RAW GIT HISTORY</text>

  <!-- Version tags scattered -->
  <rect x="105" y="190" width="50" height="22" fill="#B85C3C"/>
  <text x="130" y="206" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">v1.0</text>
  <rect x="340" y="215" width="50" height="22" fill="#5C3A6B"/>
  <text x="365" y="231" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">v1.1</text>
  <rect x="170" y="250" width="50" height="22" fill="#6B8E23"/>
  <text x="195" y="266" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">v1.2</text>
  <rect x="290" y="295" width="50" height="22" fill="#B85C3C"/>
  <text x="315" y="311" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">v1.3</text>
  <rect x="120" y="340" width="60" height="22" fill="#5C3A6B"/>
  <text x="150" y="356" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">v1.4.0</text>

  <!-- Commit dots (scattered) -->
  <circle cx="165" cy="200" r="5" fill="#2C2C2C"/>
  <circle cx="225" cy="215" r="5" fill="#2C2C2C"/>
  <circle cx="290" cy="205" r="5" fill="#2C2C2C"/>
  <circle cx="330" cy="240" r="5" fill="#2C2C2C"/>
  <circle cx="250" cy="270" r="5" fill="#2C2C2C"/>
  <circle cx="180" cy="300" r="5" fill="#2C2C2C"/>
  <circle cx="230" cy="325" r="5" fill="#2C2C2C"/>
  <circle cx="350" cy="345" r="5" fill="#2C2C2C"/>
  <circle cx="200" cy="380" r="5" fill="#2C2C2C"/>
  <circle cx="300" cy="390" r="5" fill="#2C2C2C"/>
  <circle cx="150" cy="420" r="5" fill="#2C2C2C"/>
  <circle cx="380" cy="430" r="5" fill="#2C2C2C"/>
  <circle cx="260" cy="450" r="5" fill="#2C2C2C"/>
  <circle cx="200" cy="490" r="5" fill="#2C2C2C"/>
  <circle cx="330" cy="500" r="5" fill="#2C2C2C"/>

  <!-- Zig-zag branch lines between commits -->
  <path d="M 165 200 L 225 215 L 290 205 L 330 240 L 250 270 L 180 300 L 230 325 L 350 345 L 200 380 L 300 390 L 150 420 L 380 430 L 260 450 L 200 490 L 330 500"
        fill="none" stroke="#2C2C2C" stroke-width="1.5" opacity="0.25"/>

  <!-- Label -->
  <text x="260" y="528" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666666" font-style="italic">unstructured · shipped · undocumented</text>

  <!-- Arrow between panels -->
  <line x1="440" y1="330" x2="502" y2="330" stroke="#2C2C2C" stroke-width="4"/>
  <polygon points="498,320 515,330 498,340" fill="#2C2C2C"/>
  <text x="471" y="318" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#B85C3C">CLAUDE</text>
  <text x="471" y="354" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">reads · surfaces</text>

  <!-- Right panel: 7-phase workflow (structured output) -->
  <rect x="533" y="136" width="587" height="420" fill="#5C3A6B" opacity="0.35"/>
  <rect x="517" y="120" width="587" height="420" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
  <rect x="517" y="120" width="587" height="52" fill="#2C2C2C"/>
  <text x="810" y="153" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#F5F1E8">7-PHASE WORKFLOW</text>

  <!-- 7 phase cards, 2 rows -->
  <!-- Row 1 -->
  <g font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <rect x="540" y="195" width="120" height="64" fill="#B85C3C" stroke="#2C2C2C" stroke-width="2"/>
    <text x="600" y="225" text-anchor="middle" fill="#F5F1E8" font-size="11" letter-spacing="1">PHASE 1</text>
    <text x="600" y="245" text-anchor="middle" fill="#F5F1E8" font-size="15">BUILD</text>

    <rect x="680" y="195" width="120" height="64" fill="#B85C3C" stroke="#2C2C2C" stroke-width="2"/>
    <text x="740" y="225" text-anchor="middle" fill="#F5F1E8" font-size="11" letter-spacing="1">PHASE 2</text>
    <text x="740" y="245" text-anchor="middle" fill="#F5F1E8" font-size="15">SHIP</text>

    <rect x="820" y="195" width="120" height="64" fill="#E8B923" stroke="#2C2C2C" stroke-width="2"/>
    <text x="880" y="225" text-anchor="middle" fill="#2C2C2C" font-size="11" letter-spacing="1">PHASE 3</text>
    <text x="880" y="245" text-anchor="middle" fill="#2C2C2C" font-size="15">PLAN</text>

    <rect x="960" y="195" width="120" height="64" fill="#E8B923" stroke="#2C2C2C" stroke-width="2"/>
    <text x="1020" y="225" text-anchor="middle" fill="#2C2C2C" font-size="11" letter-spacing="1">PHASE 4</text>
    <text x="1020" y="245" text-anchor="middle" fill="#2C2C2C" font-size="15">EXECUTE</text>

    <!-- Row 2 (3 cards centered) -->
    <rect x="610" y="305" width="120" height="64" fill="#6B8E23" stroke="#2C2C2C" stroke-width="2"/>
    <text x="670" y="335" text-anchor="middle" fill="#F5F1E8" font-size="11" letter-spacing="1">PHASE 5</text>
    <text x="670" y="355" text-anchor="middle" fill="#F5F1E8" font-size="14">RELEASE</text>

    <rect x="750" y="305" width="120" height="64" fill="#6B8E23" stroke="#2C2C2C" stroke-width="2"/>
    <text x="810" y="335" text-anchor="middle" fill="#F5F1E8" font-size="11" letter-spacing="1">PHASE 6</text>
    <text x="810" y="355" text-anchor="middle" fill="#F5F1E8" font-size="13">DOCUMENT</text>

    <rect x="890" y="305" width="120" height="64" fill="#5C3A6B" stroke="#2C2C2C" stroke-width="2"/>
    <text x="950" y="335" text-anchor="middle" fill="#F5F1E8" font-size="11" letter-spacing="1">PHASE 7</text>
    <text x="950" y="355" text-anchor="middle" fill="#F5F1E8" font-size="15">MARKET</text>
  </g>

  <!-- Horizontal connecting arrows (row 1) -->
  <line x1="660" y1="227" x2="680" y2="227" stroke="#2C2C2C" stroke-width="2"/>
  <line x1="800" y1="227" x2="820" y2="227" stroke="#2C2C2C" stroke-width="2"/>
  <line x1="940" y1="227" x2="960" y2="227" stroke="#2C2C2C" stroke-width="2"/>
  <!-- Row-to-row bridge -->
  <path d="M 1020 259 L 1020 285 L 670 285 L 670 305" fill="none" stroke="#2C2C2C" stroke-width="2" stroke-dasharray="4 4"/>
  <!-- Row 2 arrows -->
  <line x1="730" y1="337" x2="750" y2="337" stroke="#2C2C2C" stroke-width="2"/>
  <line x1="870" y1="337" x2="890" y2="337" stroke="#2C2C2C" stroke-width="2"/>

  <!-- Why-section underline accent -->
  <rect x="540" y="405" width="560" height="1" fill="#2C2C2C" opacity="0.2"/>
  <text x="810" y="432" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C2C2C">DOCUMENTED WHY, NOT JUST WHAT</text>
  <text x="810" y="455" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666666">each phase carries the non-obvious decision behind it —</text>
  <text x="810" y="472" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666666">the discipline that makes handoffs survive</text>

  <!-- Compound Engineering credit badge -->
  <rect x="600" y="498" width="420" height="30" fill="#2C2C2C"/>
  <text x="810" y="518" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#F5F1E8">COMPOUND ENGINEERING · EVERY.TO</text>

  <!-- Bottom footer -->
  <rect x="0" y="624" width="1200" height="6" fill="#5C3A6B"/>
</svg>
