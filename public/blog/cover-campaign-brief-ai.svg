<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="50%" style="stop-color:#EDE8DC"/>
      <stop offset="100%" style="stop-color:#E5DDD0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Dot pattern -->
  <pattern id="dots2" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#2C2C2C" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots2)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#5C3A6B"/>

  <!-- Left accent bar -->
  <rect x="40" y="60" width="6" height="510" fill="#B85C3C"/>

  <!-- Main document/brief illustration -->
  <!-- Document shadow -->
  <rect x="96" y="96" width="440" height="440" fill="#E8B923" opacity="0.4"/>
  <!-- Document -->
  <rect x="80" y="80" width="440" height="440" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>

  <!-- Document header -->
  <rect x="80" y="80" width="440" height="60" fill="#2C2C2C"/>
  <text x="300" y="118" font-family="Georgia, serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#F5F1E8">CAMPAIGN BRIEF</text>

  <!-- Document sections -->
  <!-- Executive Summary -->
  <rect x="110" y="160" width="120" height="22" rx="2" fill="#B85C3C"/>
  <text x="170" y="176" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#FFFFFF">EXECUTIVE SUMMARY</text>
  <rect x="110" y="192" width="380" height="6" rx="3" fill="#2C2C2C" opacity="0.12"/>
  <rect x="110" y="204" width="340" height="6" rx="3" fill="#2C2C2C" opacity="0.10"/>
  <rect x="110" y="216" width="360" height="6" rx="3" fill="#2C2C2C" opacity="0.12"/>

  <!-- Audience -->
  <rect x="110" y="242" width="80" height="22" rx="2" fill="#5C3A6B"/>
  <text x="150" y="258" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#FFFFFF">AUDIENCE</text>
  <!-- Persona cards -->
  <rect x="110" y="274" width="115" height="50" rx="2" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <circle cx="135" cy="299" r="10" fill="#B85C3C" opacity="0.3"/>
  <rect x="152" y="289" width="60" height="6" rx="3" fill="#2C2C2C" opacity="0.15"/>
  <rect x="152" y="301" width="45" height="5" rx="2" fill="#2C2C2C" opacity="0.10"/>

  <rect x="235" y="274" width="115" height="50" rx="2" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <circle cx="260" cy="299" r="10" fill="#5C3A6B" opacity="0.3"/>
  <rect x="277" y="289" width="60" height="6" rx="3" fill="#2C2C2C" opacity="0.15"/>
  <rect x="277" y="301" width="45" height="5" rx="2" fill="#2C2C2C" opacity="0.10"/>

  <rect x="360" y="274" width="115" height="50" rx="2" fill="#FAFAFA" stroke="#2C2C2C" stroke-width="1"/>
  <circle cx="385" cy="299" r="10" fill="#6B8E23" opacity="0.3"/>
  <rect x="402" y="289" width="60" height="6" rx="3" fill="#2C2C2C" opacity="0.15"/>
  <rect x="402" y="301" width="45" height="5" rx="2" fill="#2C2C2C" opacity="0.10"/>

  <!-- Channels -->
  <rect x="110" y="340" width="80" height="22" rx="2" fill="#6B8E23"/>
  <text x="150" y="356" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#FFFFFF">CHANNELS</text>
  <rect x="110" y="372" width="380" height="6" rx="3" fill="#6B8E23" opacity="0.2"/>
  <rect x="110" y="384" width="300" height="6" rx="3" fill="#6B8E23" opacity="0.15"/>

  <!-- KPIs -->
  <rect x="110" y="410" width="50" height="22" rx="2" fill="#E8B923"/>
  <text x="135" y="426" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2C2C2C">KPIs</text>
  <rect x="110" y="442" width="380" height="6" rx="3" fill="#E8B923" opacity="0.25"/>
  <rect x="110" y="454" width="340" height="6" rx="3" fill="#E8B923" opacity="0.20"/>
  <rect x="110" y="466" width="280" height="6" rx="3" fill="#E8B923" opacity="0.15"/>

  <!-- Right side: Process steps -->
  <!-- Step 1 -->
  <rect x="600" y="90" width="260" height="100" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="608" y="98" width="244" height="84" fill="#FAFAFA"/>
  <circle cx="640" cy="130" r="20" fill="#B85C3C"/>
  <text x="640" y="137" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">1</text>
  <text x="675" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">Set Up Context</text>
  <text x="675" y="142" font-family="Arial, sans-serif" font-size="11" fill="#666666">Brand docs + past campaigns</text>
  <!-- Shadow -->
  <rect x="604" y="190" width="260" height="5" fill="#E8B923" opacity="0.5"/>

  <!-- Arrow -->
  <line x1="730" y1="195" x2="730" y2="220" stroke="#2C2C2C" stroke-width="2"/>
  <polygon points="724,216 730,228 736,216" fill="#2C2C2C"/>

  <!-- Step 2 -->
  <rect x="600" y="230" width="260" height="100" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="608" y="238" width="244" height="84" fill="#FAFAFA"/>
  <circle cx="640" cy="270" r="20" fill="#5C3A6B"/>
  <text x="640" y="277" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">2</text>
  <text x="675" y="262" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">AI Generates Brief</text>
  <text x="675" y="282" font-family="Arial, sans-serif" font-size="11" fill="#666666">Strategy + audience + channels</text>
  <rect x="604" y="330" width="260" height="5" fill="#E8B923" opacity="0.5"/>

  <!-- Arrow -->
  <line x1="730" y1="335" x2="730" y2="360" stroke="#2C2C2C" stroke-width="2"/>
  <polygon points="724,356 730,368 736,356" fill="#2C2C2C"/>

  <!-- Step 3 -->
  <rect x="600" y="370" width="260" height="100" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  <rect x="608" y="378" width="244" height="84" fill="#FAFAFA"/>
  <circle cx="640" cy="410" r="20" fill="#6B8E23"/>
  <text x="640" y="417" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#FFFFFF">3</text>
  <text x="675" y="402" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">Multi-Perspective Review</text>
  <text x="675" y="422" font-family="Arial, sans-serif" font-size="11" fill="#666666">CFO + Creative + Customer view</text>
  <rect x="604" y="470" width="260" height="5" fill="#E8B923" opacity="0.5"/>

  <!-- Timer badge -->
  <rect x="920" y="140" width="200" height="80" fill="#2C2C2C" stroke="#E8B923" stroke-width="3"/>
  <text x="1020" y="175" font-family="Georgia, serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#E8B923">10 min</text>
  <text x="1020" y="203" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#A8A8A8">blank page to brief</text>

  <!-- Quality badge -->
  <rect x="920" y="260" width="200" height="60" fill="#B85C3C"/>
  <text x="1020" y="298" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#F5F1E8">STRATEGIC, NOT GENERIC</text>

  <!-- Checkmarks -->
  <rect x="920" y="350" width="200" height="140" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="2"/>
  <text x="940" y="380" font-family="Arial, sans-serif" font-size="13" fill="#6B8E23">&#x2713; Audience segmentation</text>
  <text x="940" y="405" font-family="Arial, sans-serif" font-size="13" fill="#6B8E23">&#x2713; Channel strategy</text>
  <text x="940" y="430" font-family="Arial, sans-serif" font-size="13" fill="#6B8E23">&#x2713; Messaging framework</text>
  <text x="940" y="455" font-family="Arial, sans-serif" font-size="13" fill="#6B8E23">&#x2713; Success metrics</text>
  <text x="940" y="480" font-family="Arial, sans-serif" font-size="13" fill="#6B8E23">&#x2713; Budget allocation</text>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#2C2C2C"/>
</svg>
